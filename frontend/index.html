<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="NextInLine — Hiring pipelines that move themselves. Manage applicants, waitlists, and promotions in real time." />
    <title>NextInLine – Smart Hiring Pipelines</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --bg: #0a0b0f;
        --surface: #111218;
        --surface2: #1a1c27;
        --border: #2a2d3e;
        --text: #e8eaf0;
        --text-muted: #6b7099;
        --text-dim: #9194b0;
        --blue: #4f7dff;
        --blue-dark: #3d65e0;
        --blue-glow: rgba(79,125,255,0.15);
        --green: #22d3a0;
        --yellow: #f5c842;
        --red: #ff5b5b;
        --purple: #a78bfa;
        --radius: 12px;
        --radius-lg: 18px;
        --shadow: 0 4px 24px rgba(0,0,0,0.4);
      }
      html { scroll-behavior: smooth; }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
      }
      button { cursor: pointer; font-family: inherit; }
      input, select { font-family: inherit; }
      a { color: inherit; text-decoration: none; }
      #root { min-height: 100vh; }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: var(--bg); }
      ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

      /* Animations */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes pulse-ring {
        0%   { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(79,125,255,0.4); }
        70%  { transform: scale(1);    box-shadow: 0 0 0 10px rgba(79,125,255,0); }
        100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(79,125,255,0); }
      }
      @keyframes shimmer {
        0%   { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .animate-in { animation: fadeIn 0.35s ease both; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
